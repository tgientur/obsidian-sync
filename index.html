<!DOCTYPE html>
<html lang=zh>
<head>
  <meta charset=UTF-8>
  <meta name=viewport content=width=device-width, initial-scale=1.0>
  <title>Hanako 笔记</title>
  <link rel=stylesheet href=//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css>
</head>
<body>
  <div id=app></div>
  <script src=//cdn.jsdelivr.net/npm/docsify@4></script>
  <script>
    // 自定义插件：把 Obsidian [[wikilinks]] 转成标准 markdown 链接
    function wikilinkPlugin(hook, vm) {
      hook.beforeEach(function(content) {
        // [[链接|显示文字]] → [显示文字](链接.md)
        // [[链接]] → [链接](链接.md)
        return content
          .replace(/\[\[([^\]|]+)\|([^\]|]+)\]\]/g, '[$2]($1.md)')
          .replace(/\[\[([^\]|]+)\]\]/g, '[$1]($1.md)');
      });
    }

    window.$docsify = {
      name: 'Hanako 笔记',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      search: 'auto',
      autoHeader: true,
      plugins: [wikilinkPlugin],
    }
  </script>
  <script src=//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js></script>
</body>
</html>
